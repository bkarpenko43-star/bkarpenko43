<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FPS Game</title>
<style>
  body { margin: 0; overflow: hidden; }
  #menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="menu">
  <h1>Моя игра</h1>
  <button onclick="startGame()">Играть</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let move = {w:false,a:false,s:false,d:false};
let enemies = [];
let bullets = [];

function startGame() {
  document.getElementById("menu").style.display = "none";

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  camera.position.y = 1.6;

  // пол
  let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshBasicMaterial({color: 0x888888})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // стены
  function createWall(x,z){
    let wall = new THREE.Mesh(
      new THREE.BoxGeometry(2,2,2),
      new THREE.MeshBasicMaterial({color: 0x444444})
    );
    wall.position.set(x,1,z);
    scene.add(wall);
  }

  createWall(5,0);
  createWall(-5,0);
  createWall(0,5);
  createWall(0,-5);

  // враги
  function createEnemy(x,z){
    let enemy = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshBasicMaterial({color: 0xff0000})
    );
    enemy.position.set(x,0.5,z);
    scene.add(enemy);
    enemies.push(enemy);
  }

  createEnemy(3,3);
  createEnemy(-3,-3);

  // управление
  document.addEventListener("keydown", e=>{
    if(e.key==="w") move.w=true;
    if(e.key==="a") move.a=true;
    if(e.key==="s") move.s=true;
    if(e.key==="d") move.d=true;
  });

  document.addEventListener("keyup", e=>{
    if(e.key==="w") move.w=false;
    if(e.key==="a") move.a=false;
    if(e.key==="s") move.s=false;
    if(e.key==="d") move.d=false;
  });

  document.addEventListener("click", shoot);

  animate();
}

function shoot(){
  let bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color: 0xffff00})
  );
  bullet.position.copy(camera.position);
  bullet.direction = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  scene.add(bullet);
  bullets.push(bullet);
}

function animate(){
  requestAnimationFrame(animate);

  let speed = 0.1;
  let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

  if(move.w) camera.position.addScaledVector(forward, speed);
  if(move.s) camera.position.addScaledVector(forward, -speed);
  if(move.a) camera.position.addScaledVector(right, -speed);
  if(move.d) camera.position.addScaledVector(right, speed);

  // движение врагов
  enemies.forEach(e=>{
    let dir = camera.position.clone().sub(e.position).normalize();
    e.position.addScaledVector(dir, 0.02);
  });

  // пули
  bullets.forEach((b,i)=>{
    b.position.addScaledVector(b.direction, 0.3);

    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position) < 0.5){
        scene.remove(e);
        enemies.splice(ei,1);
      }
    });
  });

  renderer.render(scene, camera);
}
</script>

</body>
</html>
